name: Performance

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/performance.yml"
      - "src-tauri/**"
  pull_request:
    paths:
      - ".github/workflows/performance.yml"
      - "src-tauri/**"
  workflow_dispatch:

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-perf-smoke:
    name: Rust perf smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust performance smoke test
        run: |
          cargo run \
            --manifest-path src-tauri/Cargo.toml \
            --release \
            --example perf_ci \
            -- \
            --size-mib 64 \
            --iterations 3 \
            --sample-path src-tauri/target/perf-ci-sample.json \
            --output src-tauri/target/perf-ci.json

      - name: Publish performance summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("src-tauri/target/perf-ci.json")
          report = json.loads(report_path.read_text())

          lines = [
              "## Rust performance smoke test",
              "",
              (
                  f"Dataset: `{report['dataset']['size_mib']:.1f} MiB`, "
                  f"`{report['dataset']['node_count']}` nodes"
              ),
          ]
          if report["dataset"]["generated"]:
              lines.append(
                  f"Generated items: `{report['dataset']['items']}` from "
                  f"`{report['dataset']['path']}`"
              )
          else:
              lines.append(f"Input file: `{report['dataset']['path']}`")
          lines.extend(
              [
                  "",
                  f"Regex search: `{report['search_regex_info']['query']}` over "
                  f"`{report['search_regex_info']['target']}` "
                  f"(max `{report['search_regex_info']['max_results']}` results, "
                  f"observed `{report['search_regex_info']['matches']}`)",
                  f"Text search: `{report['search_text_info']['query']}` over "
                  f"`{report['search_text_info']['target']}` "
                  f"(max `{report['search_text_info']['max_results']}` results, "
                  f"observed `{report['search_text_info']['matches']}`)",
                  f"Object search: `{report['search_objects_info']['path']} {report['search_objects_info']['operator']} {report['search_objects_info']['value']}` "
                  f"(max `{report['search_objects_info']['max_results']}` results, "
                  f"observed `{report['search_objects_info']['matches']}`)",
                  f"Expand-all descendants visited: `{report['expand']['total_descendants']}`",
                  "",
                  "### Timings",
                  "",
                  "| Metric | Best | Median | Samples |",
                  "|---|---:|---:|---|",
              ]
          )

          for metric_name, key in [
              ("load", "load"),
              ("search_regex", "search_regex"),
              ("search_text", "search_text"),
              ("search_objects", "search_objects"),
              ("expand_all", "expand_all"),
          ]:
              metric = report[key]
              samples = ", ".join(f"{value:.2f} ms" for value in metric["samples_ms"])
              lines.append(
                  f"| {metric_name} | {metric['best_ms']:.2f} ms | "
                  f"{metric['median_ms']:.2f} ms | {samples} |"
              )

          lines.extend(
              [
                  "",
                  "### Memory",
                  "",
                  "| Metric | Value |",
                  "|---|---:|",
                  f"| index_heap_estimate | {report['memory']['index_heap_mib_estimate']:.2f} MiB |",
                  f"| bytes_per_node | {report['memory']['bytes_per_node']:.2f} B |",
                  f"| bytes_per_input_byte | {report['memory']['bytes_per_input_byte']:.3f} |",
                  f"| node_size | {report['memory']['node_size_bytes']} B |",
                  f"| nodes_heap | {report['memory']['nodes_bytes_estimate'] / (1024 * 1024):.2f} MiB |",
                  f"| parent_index_heap | {report['memory']['parent_index_bytes_estimate'] / (1024 * 1024):.2f} MiB |",
                  f"| container_meta_heap | {report['memory']['container_meta_bytes_estimate'] / (1024 * 1024):.2f} MiB |",
                  f"| keys_heap | {report['memory']['keys_bytes_estimate'] / (1024 * 1024):.2f} MiB |",
                  f"| value_strings_heap | {report['memory']['value_strings_bytes_estimate'] / (1024 * 1024):.2f} MiB |",
                  f"| numbers_heap | {report['memory']['numbers_bytes_estimate'] / (1024 * 1024):.2f} MiB |",
                  "",
                  "These CI numbers are trend-oriented only. "
                  "GitHub-hosted runners are noisy, so treat them as a smoke test "
                  "and historical trace, not as a hard performance budget.",
                  "",
              ]
          )

          summary = "\n".join(lines)
          Path("src-tauri/target/perf-ci-summary.md").write_text(summary)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(summary)
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: rust-perf-smoke
          path: |
            src-tauri/target/perf-ci.json
            src-tauri/target/perf-ci-summary.md
          retention-days: 30
