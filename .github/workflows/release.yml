name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Crea la release draft
  # ─────────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────
  # 2a. macOS — universal binary (arm64 + x86_64)
  # ─────────────────────────────────────────────────────────
  release-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Build universal macOS app
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
      - name: Save macOS signature for latest.json
        run: |
          SIG=$(cat src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig)
          URL=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz | xargs basename)
          echo "{\"sig\":\"$SIG\",\"url\":\"$URL\"}" > macos-sig.json
      - uses: actions/upload-artifact@v4
        with:
          name: macos-sig
          path: macos-sig.json

  # ─────────────────────────────────────────────────────────
  # 2b. Windows x64
  # ─────────────────────────────────────────────────────────
  release-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Build Windows app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
      - name: Save Windows signature for latest.json
        shell: bash
        run: |
          SIG=$(cat src-tauri/target/release/bundle/nsis/*.nsis.zip.sig)
          URL=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip | xargs basename)
          echo "{\"sig\":\"$SIG\",\"url\":\"$URL\"}" > windows-sig.json
      - uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: windows-sig.json

  # ─────────────────────────────────────────────────────────
  # 2c. Linux x64
  # ─────────────────────────────────────────────────────────
  release-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Build Linux app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
      - name: Save Linux signature for latest.json
        run: |
          SIG=$(cat src-tauri/target/release/bundle/appimage/*.AppImage.sig)
          URL=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | xargs basename)
          echo "{\"sig\":\"$SIG\",\"url\":\"$URL\"}" > linux-sig.json
      - uses: actions/upload-artifact@v4
        with:
          name: linux-sig
          path: linux-sig.json

  # ─────────────────────────────────────────────────────────
  # 3. Genera latest.json e pubblica la release
  # ─────────────────────────────────────────────────────────
  publish-release:
    needs: [release-macos, release-windows, release-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: macos-sig,   path: artifacts }
      - uses: actions/download-artifact@v4
        with: { name: windows-sig, path: artifacts }
      - uses: actions/download-artifact@v4
        with: { name: linux-sig,   path: artifacts }

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: pingsrl/json-gui
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/$REPO/releases/download/$TAG"

          MACOS_SIG=$(python3 -c "import json; d=json.load(open('artifacts/macos-sig.json')); print(d['sig'])")
          MACOS_URL=$(python3 -c "import json; d=json.load(open('artifacts/macos-sig.json')); print(d['url'])")

          WIN_SIG=$(python3 -c "import json; d=json.load(open('artifacts/windows-sig.json')); print(d['sig'])")
          WIN_URL=$(python3 -c "import json; d=json.load(open('artifacts/windows-sig.json')); print(d['url'])")

          LINUX_SIG=$(python3 -c "import json; d=json.load(open('artifacts/linux-sig.json')); print(d['sig'])")
          LINUX_URL=$(python3 -c "import json; d=json.load(open('artifacts/linux-sig.json')); print(d['url'])")

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - <<PYEOF
          import json
          data = {
            "version": "$VERSION",
            "notes": "",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {"signature": "$MACOS_SIG", "url": "$BASE/$MACOS_URL"},
              "darwin-x86_64":  {"signature": "$MACOS_SIG", "url": "$BASE/$MACOS_URL"},
              "linux-x86_64":   {"signature": "$LINUX_SIG", "url": "$BASE/$LINUX_URL"},
              "windows-x86_64": {"signature": "$WIN_SIG",   "url": "$BASE/$WIN_URL"},
            }
          }
          with open("latest.json", "w") as f:
            json.dump(data, f, indent=2)
          print("latest.json generated")
          PYEOF

      - name: Upload latest.json and publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: latest.json
