name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Crea la release draft
  # ─────────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────
  # 2a. macOS — universal binary (arm64 + x86_64)
  # ─────────────────────────────────────────────────────────
  release-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            console.log('Version set to', v);
          "
      - name: Build universal macOS app
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
      - name: Save macOS signature for latest.json
        run: |
          SIG_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig 2>/dev/null | head -1)
          TAR_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$TAR_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            URL=$(basename "$TAR_FILE")
            echo "{\"sig\":\"$SIG\",\"url\":\"$URL\",\"ok\":true}" > macos-sig.json
          else
            echo '{"ok":false}' > macos-sig.json
            echo "::warning::No .sig file found — TAURI_SIGNING_PRIVATE_KEY may not be set"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: macos-sig
          path: macos-sig.json

  # ─────────────────────────────────────────────────────────
  # 2b. Windows x64
  # ─────────────────────────────────────────────────────────
  release-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            console.log('Version set to', v);
          "
      - name: Build Windows app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
      - name: Save Windows signature for latest.json
        shell: bash
        run: |
          SIG_FILE=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip.sig 2>/dev/null | head -1)
          ZIP_FILE=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$ZIP_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            URL=$(basename "$ZIP_FILE")
            echo "{\"sig\":\"$SIG\",\"url\":\"$URL\",\"ok\":true}" > windows-sig.json
          else
            echo '{"ok":false}' > windows-sig.json
            echo "::warning::No .sig file found — TAURI_SIGNING_PRIVATE_KEY may not be set"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: windows-sig.json

  # ─────────────────────────────────────────────────────────
  # 2c. Linux x64
  # ─────────────────────────────────────────────────────────
  release-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            console.log('Version set to', v);
          "
      - name: Build Linux app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
      - name: Save Linux signature for latest.json
        run: |
          SIG_FILE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage.sig 2>/dev/null | head -1)
          IMG_FILE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$IMG_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            URL=$(basename "$IMG_FILE")
            echo "{\"sig\":\"$SIG\",\"url\":\"$URL\",\"ok\":true}" > linux-sig.json
          else
            echo '{"ok":false}' > linux-sig.json
            echo "::warning::No .sig file found — TAURI_SIGNING_PRIVATE_KEY may not be set"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: linux-sig
          path: linux-sig.json

  # ─────────────────────────────────────────────────────────
  # 3. Genera latest.json e pubblica la release
  # ─────────────────────────────────────────────────────────
  publish-release:
    needs: [release-macos, release-windows, release-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with: { name: macos-sig, path: artifacts }
      - uses: actions/download-artifact@v8
        with: { name: windows-sig, path: artifacts }
      - uses: actions/download-artifact@v8
        with: { name: linux-sig, path: artifacts }

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: pingsrl/json-gui
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, subprocess
          from datetime import datetime, timezone

          tag  = os.environ["TAG"]
          repo = os.environ["REPO"]
          version = tag.lstrip("v")
          base = f"https://github.com/{repo}/releases/download/{tag}"
          pub_date = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def load(name):
              d = json.load(open(f"artifacts/{name}"))
              if not d.get("ok"):
                  print(f"::warning::Signatures missing in {name} — latest.json will not include auto-update info")
                  return None, None
              return d["sig"], d["url"]

          macos_sig, macos_url   = load("macos-sig.json")
          win_sig,   win_url     = load("windows-sig.json")
          linux_sig, linux_url   = load("linux-sig.json")

          if not all([macos_sig, win_sig, linux_sig]):
              print("::warning::One or more signatures are missing. Skipping latest.json generation.")
              print("Set TAURI_SIGNING_PRIVATE_KEY in GitHub Secrets to enable auto-updates.")
              sys.exit(0)

          data = {
            "version": version,
            "notes": "",
            "pub_date": pub_date,
            "platforms": {
              "darwin-aarch64": {"signature": macos_sig, "url": f"{base}/{macos_url}"},
              "darwin-x86_64":  {"signature": macos_sig, "url": f"{base}/{macos_url}"},
              "linux-x86_64":   {"signature": linux_sig, "url": f"{base}/{linux_url}"},
              "windows-x86_64": {"signature": win_sig,   "url": f"{base}/{win_url}"},
            }
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print("latest.json generated successfully")
          PYEOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false

      - name: Upload latest.json (if signatures were available)
        if: hashFiles('latest.json') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
