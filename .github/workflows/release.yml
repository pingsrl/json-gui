name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────
  # 0. Verifica che il commit del tag sia su master.
  #    Blocca l'intera pipeline se il tag punta a un commit
  #    non raggiungibile da origin/master.
  # ─────────────────────────────────────────────────────────
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # history completa necessaria per merge-base
      - name: Verify tag commit is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master || {
            echo "::error::Tag $GITHUB_REF_NAME points to a commit not on master. Aborting release."
            exit 1
          }

  # ─────────────────────────────────────────────────────────
  # 1. Crea la release draft
  # ─────────────────────────────────────────────────────────
  create-release:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # necessario per trovare il tag precedente
      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(gh api "repos/${REPO}/releases/generate-notes" \
              --method POST \
              -f tag_name="${TAG}" \
              -f previous_tag_name="${PREV_TAG}" \
              --jq '.body')
          else
            NOTES=$(gh api "repos/${REPO}/releases/generate-notes" \
              --method POST \
              -f tag_name="${TAG}" \
              --jq '.body')
          fi
          echo "body<<RELEASE_NOTES_EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$NOTES" >> "$GITHUB_OUTPUT"
          echo "RELEASE_NOTES_EOF" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: true
          body: ${{ steps.notes.outputs.body }}

  # ─────────────────────────────────────────────────────────
  # 1b. Benchmark snapshot appended to the draft release body
  # ─────────────────────────────────────────────────────────
  release-benchmarks:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust performance smoke test
        run: |
          cargo run \
            --manifest-path src-tauri/Cargo.toml \
            --release \
            --example perf_ci \
            -- \
            --size-mib 64 \
            --iterations 3 \
            --sample-path src-tauri/target/perf-ci-sample.json \
            --output src-tauri/target/perf-ci.json

      - name: Generate benchmark summary
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("src-tauri/target/perf-ci.json").read_text())

          release_lines = [
              "<!-- benchmark-section:start -->",
              "## CI Benchmarks",
              "",
              (
                  "Release snapshot measured on GitHub Actions using the deterministic "
                  "Rust perf smoke dataset."
              ),
              "",
              f"- Dataset: `{report['dataset']['size_mib']:.1f} MiB`, `{report['dataset']['node_count']}` nodes",
              f"- Regex search: `{report['search_regex_info']['query']}` over `{report['search_regex_info']['target']}`",
              f"- Text search: `{report['search_text_info']['query']}` over `{report['search_text_info']['target']}`",
              f"- Object search: `{report['search_objects_info']['path']} {report['search_objects_info']['operator']} {report['search_objects_info']['value']}`",
              f"- Source run: [#{os.environ['RUN_NUMBER']}](https://github.com/{os.environ['REPO']}/actions/runs/{os.environ['RUN_ID']})",
              "",
              "### Timings",
              "",
              "| Metric | Best | Median | Samples |",
              "|---|---:|---:|---|",
          ]

          action_lines = [
              "## Release benchmark snapshot",
              "",
              f"Dataset: `{report['dataset']['size_mib']:.1f} MiB`, `{report['dataset']['node_count']}` nodes",
              f"Regex search: `{report['search_regex_info']['query']}` over `{report['search_regex_info']['target']}`",
              f"Text search: `{report['search_text_info']['query']}` over `{report['search_text_info']['target']}`",
              f"Object search: `{report['search_objects_info']['path']} {report['search_objects_info']['operator']} {report['search_objects_info']['value']}`",
              "",
              "### Timings",
              "",
              "| Metric | Best | Median | Samples |",
              "|---|---:|---:|---|",
          ]

          for metric_name, key in [
              ("load", "load"),
              ("search_regex", "search_regex"),
              ("search_text", "search_text"),
              ("search_objects", "search_objects"),
              ("expand_all", "expand_all"),
          ]:
              metric = report[key]
              samples = ", ".join(f"{value:.2f} ms" for value in metric["samples_ms"])
              row = (
                  f"| {metric_name} | {metric['best_ms']:.2f} ms | "
                  f"{metric['median_ms']:.2f} ms | {samples} |"
              )
              release_lines.append(row)
              action_lines.append(row)

          release_lines.extend(
              [
                  "",
                  "### Memory",
                  "",
                  "| Metric | Value |",
                  "|---|---:|",
                  f"| index_heap_estimate | {report['memory']['index_heap_mib_estimate']:.2f} MiB |",
                  f"| bytes_per_node | {report['memory']['bytes_per_node']:.2f} B |",
                  f"| bytes_per_input_byte | {report['memory']['bytes_per_input_byte']:.3f} |",
                  f"| node_size | {report['memory']['node_size_bytes']} B |",
              ]
          )
          action_lines.extend(
              [
                  "",
                  "### Memory",
                  "",
                  "| Metric | Value |",
                  "|---|---:|",
                  f"| index_heap_estimate | {report['memory']['index_heap_mib_estimate']:.2f} MiB |",
                  f"| bytes_per_node | {report['memory']['bytes_per_node']:.2f} B |",
                  f"| bytes_per_input_byte | {report['memory']['bytes_per_input_byte']:.3f} |",
                  f"| node_size | {report['memory']['node_size_bytes']} B |",
              ]
          )

          release_lines.extend(
              [
                  "",
                  "These numbers are useful as a release snapshot, not as a strict performance budget.",
                  "<!-- benchmark-section:end -->",
                  "",
              ]
          )
          action_lines.extend(
              [
                  "",
                  "This snapshot is also appended to the draft release body.",
                  "",
              ]
          )

          Path("src-tauri/target/perf-ci-release-section.md").write_text("\n".join(release_lines))
          summary = "\n".join(action_lines)
          Path("src-tauri/target/perf-ci-summary.md").write_text(summary)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(summary)
          PY

      - name: Append benchmarks to draft release body
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          current = subprocess.check_output(
              ["gh", "release", "view", os.environ["TAG"], "--json", "body", "--jq", ".body"],
              text=True,
          ).rstrip()
          section = Path("src-tauri/target/perf-ci-release-section.md").read_text().strip()
          start_marker = "<!-- benchmark-section:start -->"
          end_marker = "<!-- benchmark-section:end -->"
          if start_marker in current and end_marker in current:
              prefix, rest = current.split(start_marker, 1)
              _, suffix = rest.split(end_marker, 1)
              body = prefix.rstrip() + "\n\n" + section + "\n" + suffix.lstrip()
          else:
              body = current + "\n\n" + section + "\n"
          Path("src-tauri/target/release-body.md").write_text(body)
          PY
          gh release edit "$TAG" --notes-file src-tauri/target/release-body.md

      - uses: actions/upload-artifact@v7
        with:
          name: release-perf-report
          path: |
            src-tauri/target/perf-ci.json
            src-tauri/target/perf-ci-summary.md
            src-tauri/target/perf-ci-release-section.md

  # ─────────────────────────────────────────────────────────
  # 2a. macOS — universal binary (arm64 + x86_64)
  # ─────────────────────────────────────────────────────────
  release-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            console.log('Version set to', v);
          "
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Build universal macOS app
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
      - name: Save macOS signature for latest.json
        env:
          HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          if [ "$HAS_TAURI_SIGNING_KEY" != "true" ]; then
            echo '{"ok":false,"expected":false}' > macos-sig.json
            echo "::notice::TAURI updater signing key not configured; skipping macOS signature metadata"
            exit 0
          fi
          SIG_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig 2>/dev/null | head -1)
          TAR_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$TAR_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            URL=$(basename "$TAR_FILE")
            echo "{\"sig\":\"$SIG\",\"url\":\"$URL\",\"ok\":true,\"expected\":true}" > macos-sig.json
          else
            echo '{"ok":false,"expected":true}' > macos-sig.json
            echo "::warning::Expected macOS updater signature files were not generated"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: macos-sig
          path: macos-sig.json

  # ─────────────────────────────────────────────────────────
  # 2b. Windows x64
  # ─────────────────────────────────────────────────────────
  release-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            console.log('Version set to', v);
          "
      - name: Write signing key to file
        if: ${{ env.HAS_TAURI_SIGNING_KEY == 'true' }}
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '\r' > "$RUNNER_TEMP/tauri-signing.key"
      - name: Build Windows app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.HAS_TAURI_SIGNING_KEY == 'true' && format('{0}/tauri-signing.key', runner.temp) || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
      - name: Save Windows signature for latest.json
        shell: bash
        env:
          HAS_TAURI_SIGNING_KEY: ${{ env.HAS_TAURI_SIGNING_KEY }}
        run: |
          if [ "$HAS_TAURI_SIGNING_KEY" != "true" ]; then
            echo '{"ok":false,"expected":false}' > windows-sig.json
            echo "::notice::TAURI updater signing key not configured; skipping Windows signature metadata"
            exit 0
          fi
          SIG_FILE=$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          ZIP_FILE=$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -name "*.nsis.zip" -not -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$ZIP_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            URL=$(basename "$ZIP_FILE")
            echo "{\"sig\":\"$SIG\",\"url\":\"$URL\",\"ok\":true,\"expected\":true}" > windows-sig.json
          else
            echo '{"ok":false,"expected":true}' > windows-sig.json
            echo "::warning::Expected Windows updater signature files were not generated"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: windows-sig
          path: windows-sig.json

  # ─────────────────────────────────────────────────────────
  # 2c. Linux x64
  # ─────────────────────────────────────────────────────────
  release-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci --legacy-peer-deps
      - name: Set version from tag
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            console.log('Version set to', v);
          "
      - name: Write signing key to file
        if: ${{ env.HAS_TAURI_SIGNING_KEY == 'true' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '\r' > "$RUNNER_TEMP/tauri-signing.key"
      - name: Build Linux app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.HAS_TAURI_SIGNING_KEY == 'true' && format('{0}/tauri-signing.key', runner.temp) || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
      - name: Save Linux signature for latest.json
        env:
          HAS_TAURI_SIGNING_KEY: ${{ env.HAS_TAURI_SIGNING_KEY }}
        run: |
          if [ "$HAS_TAURI_SIGNING_KEY" != "true" ]; then
            echo '{"ok":false,"expected":false}' > linux-sig.json
            echo "::notice::TAURI updater signing key not configured; skipping Linux signature metadata"
            exit 0
          fi
          SIG_FILE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage.sig 2>/dev/null | head -1)
          IMG_FILE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$IMG_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            URL=$(basename "$IMG_FILE")
            echo "{\"sig\":\"$SIG\",\"url\":\"$URL\",\"ok\":true,\"expected\":true}" > linux-sig.json
          else
            echo '{"ok":false,"expected":true}' > linux-sig.json
            echo "::warning::Expected Linux updater signature files were not generated"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: linux-sig
          path: linux-sig.json

  # ─────────────────────────────────────────────────────────
  # 3. Genera latest.json e pubblica la release
  # ─────────────────────────────────────────────────────────
  publish-release:
    needs: [release-macos, release-windows, release-linux, release-benchmarks]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with: { name: macos-sig, path: artifacts }
      - uses: actions/download-artifact@v8
        with: { name: windows-sig, path: artifacts }
      - uses: actions/download-artifact@v8
        with: { name: linux-sig, path: artifacts }

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: pingsrl/json-gui
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, subprocess
          from datetime import datetime, timezone

          tag  = os.environ["TAG"]
          repo = os.environ["REPO"]
          version = tag.lstrip("v")
          base = f"https://github.com/{repo}/releases/download/{tag}"
          pub_date = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def load(name):
              d = json.load(open(f"artifacts/{name}"))
              if not d.get("ok"):
                  level = "warning" if d.get("expected", True) else "notice"
                  print(f"::{level}::Signatures missing in {name} — latest.json will not include auto-update info")
                  return None, None
              return d["sig"], d["url"]

          macos_sig, macos_url   = load("macos-sig.json")
          win_sig,   win_url     = load("windows-sig.json")
          linux_sig, linux_url   = load("linux-sig.json")

          platforms = {}
          if macos_sig:
              platforms["darwin-aarch64"] = {"signature": macos_sig, "url": f"{base}/{macos_url}"}
              platforms["darwin-x86_64"]  = {"signature": macos_sig, "url": f"{base}/{macos_url}"}
          if linux_sig:
              platforms["linux-x86_64"]   = {"signature": linux_sig, "url": f"{base}/{linux_url}"}
          if win_sig:
              platforms["windows-x86_64"] = {"signature": win_sig,   "url": f"{base}/{win_url}"}

          if not platforms:
              print("::notice::No signatures available. Skipping latest.json generation.")
              sys.exit(0)

          data = {
            "version": version,
            "notes": "",
            "pub_date": pub_date,
            "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(data, f, indent=2)
          print("latest.json generated successfully")
          PYEOF

      - name: Publish release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: false

      - name: Upload latest.json (if signatures were available)
        if: hashFiles('latest.json') != ''
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: latest.json
